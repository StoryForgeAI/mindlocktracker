workflows:
  android-apk:
    name: Mind Lock Tracker Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.example.mind_lock_tracker"
        # Set these in Codemagic UI -> Environment variables.
        SUPABASE_URL: ""
        SUPABASE_ANON_KEY: ""

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Static analysis
        script: |
          flutter analyze

      - name: Run tests
        script: |
          flutter test

      - name: Build release APK
        script: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log
      - test/widget_test.dart

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
